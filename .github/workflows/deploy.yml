name: Lint & Deploy Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Comprobar que no hay dominios de terceros prohibidos
        run: |
          ! grep -rn "api.qrserver.com\|fonts.googleapis.com" --include="*.html" --include="*.js" apps/ index.html verificacion-demo.html
      - name: Comprobar que no hay datos personales en el código de las apps
        # (en legal/ el email es una mención intencionada exigida por la LSSI-CE)
        run: |
          ! grep -rni "braisperezlorenzo@gmail" --include="*.js" apps/ 
          ! grep -rni "braisperezlorenzo@gmail" index.html verificacion-demo.html apps/facturador-pymes/index.html apps/compliance-suite/index.html
      - name: Validar sintaxis JavaScript
        run: |
          for f in apps/facturador-pymes/app.js apps/compliance-suite/app.js; do
            node --check "$f" && echo "OK $f"
          done

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
